name: Chatly CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      MONGO_URL: ${{ secrets.MONGO_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.25.6

    - name: Install dependencies
      run: go mod tidy

    - name: Build project
      run: make build

    - name: Run tests
      run: make run-test

    - name: Build Docker image
      run: make build-docker-image

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/chatly:${{ github.sha }}

    - name: Tag and push latest
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/chatly:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/chatly:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/chatly:latest
